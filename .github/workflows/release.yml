name: Release

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'

permissions:
  contents: write

jobs:
  # ── Extract release notes from CHANGELOG ───────────────────────────────────
  changelog:
    name: Extract release notes
    runs-on: ubuntu-latest
    outputs:
      notes: ${{ steps.extract.outputs.notes }}
      version: ${{ steps.version.outputs.version }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Get version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Extract CHANGELOG section
        id: extract
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          # Extract lines between the versioned header and the next header (or EOF)
          NOTES=$(awk "/^\[v${VERSION}\]/,/^\[v[0-9]/" CHANGELOG.md \
            | head -n -1 \
            | tail -n +2 \
            | sed '/^[[:space:]]*$/{ N; /^\n[[:space:]]*$/d }')
          if [[ -z "$NOTES" ]]; then
            NOTES="See [CHANGELOG.md](CHANGELOG.md) for details."
          fi
          # Write multi-line output safely
          {
            echo "notes<<EOF_NOTES"
            echo "$NOTES"
            echo "EOF_NOTES"
          } >> "$GITHUB_OUTPUT"

  # ── Linux build ────────────────────────────────────────────────────────────
  build-linux:
    name: Linux x64
    runs-on: ubuntu-latest
    needs: changelog

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install Linux system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libssl-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf \
            libasound2-dev \
            rpm

      - name: Install npm dependencies
        run: npm ci

      - name: Sync SvelteKit types
        run: npx svelte-kit sync

      - name: Import GPG signing key
        env:
          GPG_PRIVATE_KEY: ${{ secrets.GPG_PRIVATE_KEY }}
        run: echo "$GPG_PRIVATE_KEY" | gpg --batch --import

      - name: Build (release)
        run: npm run tauri build -- --bundles deb,appimage,rpm
        env:
          CI: true

      - name: Sign Linux artifacts
        env:
          GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
        run: |
          for f in \
            src-tauri/target/release/bundle/deb/*.deb \
            src-tauri/target/release/bundle/rpm/*.rpm \
            src-tauri/target/release/bundle/appimage/*.AppImage; do
            echo "$GPG_PASSPHRASE" | gpg --batch --yes --passphrase-fd 0 \
              --pinentry-mode loopback --detach-sign --armor "$f"
          done

      - name: Upload Linux artifacts
        uses: actions/upload-artifact@v4
        with:
          name: pomotroid-linux-x64
          path: |
            src-tauri/target/release/bundle/deb/*.deb
            src-tauri/target/release/bundle/deb/*.deb.asc
            src-tauri/target/release/bundle/appimage/*.AppImage
            src-tauri/target/release/bundle/appimage/*.AppImage.asc
            src-tauri/target/release/bundle/rpm/*.rpm
            src-tauri/target/release/bundle/rpm/*.rpm.asc
          if-no-files-found: error

  # ── macOS build ────────────────────────────────────────────────────────────
  build-macos:
    name: macOS (universal)
    runs-on: macos-latest
    needs: changelog

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install Rust stable (with universal targets)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install npm dependencies
        run: npm ci

      - name: Sync SvelteKit types
        run: npx svelte-kit sync

      - name: Build (release, universal binary)
        run: npm run tauri build -- --bundles dmg --target universal-apple-darwin
        env:
          CI: true

      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: pomotroid-macos-universal
          path: src-tauri/target/universal-apple-darwin/release/bundle/dmg/*.dmg
          if-no-files-found: error

  # ── Windows build ──────────────────────────────────────────────────────────
  build-windows:
    name: Windows x64
    runs-on: windows-latest
    needs: changelog

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install npm dependencies
        run: npm ci

      - name: Sync SvelteKit types
        run: npx svelte-kit sync

      - name: Build (release)
        run: npm run tauri build -- --bundles nsis
        env:
          CI: true

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: pomotroid-windows-x64
          path: |
            src-tauri/target/release/bundle/nsis/*-setup.exe
            src-tauri/target/release/pomotroid.exe
          if-no-files-found: error

  # ── Create draft GitHub Release ────────────────────────────────────────────
  release:
    name: Create draft release
    runs-on: ubuntu-latest
    needs: [changelog, build-linux, build-macos, build-windows]

    steps:
      - name: Download Linux artifacts
        uses: actions/download-artifact@v4
        with:
          name: pomotroid-linux-x64
          path: dist/linux

      - name: Download macOS artifacts
        uses: actions/download-artifact@v4
        with:
          name: pomotroid-macos-universal
          path: dist/macos

      - name: Download Windows artifacts
        uses: actions/download-artifact@v4
        with:
          name: pomotroid-windows-x64
          path: dist/windows

      - name: Create draft release
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          name: ${{ github.ref_name }}
          body: ${{ needs.changelog.outputs.notes }}
          files: |
            dist/linux/**/*.deb
            dist/linux/**/*.deb.asc
            dist/linux/**/*.AppImage
            dist/linux/**/*.AppImage.asc
            dist/linux/**/*.rpm
            dist/linux/**/*.rpm.asc
            dist/macos/**/*.dmg
            dist/windows/**/*-setup.exe
            dist/windows/**/pomotroid.exe
